<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Color Flipper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <div class="card">
            <div class="controls">
                <button class="mode-btn active" id="btn-solid">Solid Colors</button>
                <button class="mode-btn" id="btn-gradient">Linear Gradients</button>
            </div>
            
            <div class="display-area">
                <p class="mode-label" id="mode-label">Current Mode: Solid</p>
                <h2><span class="color-text" id="color-text">#F0F8FF (AliceBlue)</span></h2>
            </div>

            <button class="flip-btn" id="btn-flip">Flip Color</button>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
